            - name: SENTINELAUTH_REDIS_URL
              value: redis://redis:6379/0
          envFrom:
            - secretRef:
                name: sentinelauth-secrets
          ports:
            - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: sentinelauth
spec:
  selector:
    app: user-service
  ports:
    - port: 8001
      targetPort: 8001
