apiVersion: v1
kind: Namespace
metadata:
  name: sentinelauth
---
apiVersion: v1
kind: Secret
metadata:
  name: sentinelauth-secrets
  namespace: sentinelauth
type: Opaque
stringData:
  SENTINELAUTH_GATEWAY_SERVICE_SECRET: replace-me
  SENTINELAUTH_AUDIT_SERVICE_SECRET: replace-me
  SENTINELAUTH_POLICY_SERVICE_SECRET: replace-me
  SENTINELAUTH_USER_SERVICE_SECRET: replace-me
  SENTINELAUTH_MACHINE_CLIENT_SECRET: replace-me
  SENTINELAUTH_PRIVATE_KEY_PEM: |
    -----BEGIN PRIVATE KEY-----
    replace-me
    -----END PRIVATE KEY-----
  SENTINELAUTH_PUBLIC_KEY_PEM: |
    -----BEGIN PUBLIC KEY-----
    replace-me
    -----END PUBLIC KEY-----
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: sentinelauth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sentinelauth
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-server
  namespace: sentinelauth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-server
  template:
    metadata:
      labels:
        app: auth-server
    spec:
      containers:
        - name: auth-server
          image: sentinelauth:latest
          command: ["uvicorn", "services.auth_server.app:app", "--host", "0.0.0.0", "--port", "8000"]
          env:
            - name: SENTINELAUTH_SERVICE_NAME
              value: auth-server
            - name: SENTINELAUTH_REDIS_URL
              value: redis://redis:6379/0
          envFrom:
            - secretRef:
                name: sentinelauth-secrets
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: auth-server
  namespace: sentinelauth
spec:
  selector:
    app: auth-server
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
